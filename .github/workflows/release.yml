name: Publish Tauri App

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: '--bundles msi,nsis'
          - platform: ubuntu-latest
            args: '--bundles deb,rpm'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Get version from tag
        id: get_version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          Write-Host "Resolved version: $version"
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Install jq (cross-platform)
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            choco install jq --yes
          elif [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update && sudo apt-get install -y jq
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install jq
          fi
        shell: bash

      - name: Force Sync Version in Configs (using jq - SAFE)
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          echo "Syncing version to: $VERSION"

          # Update package.json
          jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp && mv package.json.tmp package.json

          # Update tauri.conf.json
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp && mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json

          # Update Cargo.toml (safe sed)
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml

          # Verify
          echo "package.json version:"
          jq -r '.version' package.json
          echo "tauri.conf.json version:"
          jq -r '.version' src-tauri/tauri.conf.json
          echo "Cargo.toml version:"
          grep '^version =' src-tauri/Cargo.toml
        shell: bash

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ steps.get_version.outputs.version }}
          releaseName: 'Tauri Tools v${{ steps.get_version.outputs.version }}'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}